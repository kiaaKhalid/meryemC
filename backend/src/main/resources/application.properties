# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/maintenance_db?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate Hardening
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=30000

# ML API Configuration
api.predictive.url.weekly=http://localhost:8000/predict-weekly
api.predictive.url.expert=http://localhost:8000/predict-expert

# Open-Meteo API Configuration
api.open-meteo.url=https://api.open-meteo.com/v1/forecast

# Lombok configuration
spring.main.allow-bean-definition-overriding=true

# Data Initialization (Run data.sql AFTER JPA DDL)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Request Size Limits (for Base64 Images)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-http-post-size=52428800
server.tomcat.max-swallow-size=52428800
server.max-http-header-size=65536

# Jackson limit (Note: Bean configuration in JacksonConfig.java is also applied)
spring.jackson.read-max-string-length=50MB


